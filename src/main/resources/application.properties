spring.application.name=cloud

# ---------------------------------------------------------------------------
# Sharded payment storage. Bulk requests + their items are spread across the
# instances below; routing is hash(bulkRequestId) % count. The shard count is
# static (no resharding) - to add a shard, bump `count`, add a datasource entry,
# and add a matching postgres-N service in compose.yaml.
# Schema is created by schema.sql on every shard at startup, so JPA does no DDL.
# ---------------------------------------------------------------------------
app.sharding.count=2
app.sharding.datasource.0.url=jdbc:postgresql://localhost:5432/harbour
app.sharding.datasource.0.username=postgres
app.sharding.datasource.0.password=postgres
app.sharding.datasource.1.url=jdbc:postgresql://localhost:5433/harbour
app.sharding.datasource.1.username=postgres
app.sharding.datasource.1.password=postgres

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# The "remote system" each payment is forwarded to (loopback to this app's own
# synchronous endpoint, which records it in the in-memory store).
app.remote.payments-url=http://localhost:8080/api/v1/payments

# Toxiproxy (port 9091) proxies to this app itself, so Spring Boot's TCP readiness
# check on 9091 would deadlock (upstream not up yet). Skip the check entirely —
# Toxiproxy starts in <1s so it's always ready before the app context loads.
spring.docker.compose.readiness.wait=never

# Toxiproxy sits in front of this app on port 9091 — callers should use that port
# to route through the proxy and experience injected network conditions.
# To inject latency:  POST http://localhost:8474/proxies/spring-boot-app/toxics
#   {"name":"latency","type":"latency","attributes":{"latency":2000,"jitter":500}}
# To simulate timeout: use type "timeout" with {"timeout":0}
# To reset:            DELETE http://localhost:8474/proxies/spring-boot-app/toxics/latency
