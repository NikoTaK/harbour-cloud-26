# Test config: point the shards at in-memory H2 so the full Spring context loads
# without Docker/Postgres. schema.sql (portable SQL) creates the tables on each.
app.sharding.count=2
app.sharding.datasource.0.url=jdbc:h2:mem:shard0;DB_CLOSE_DELAY=-1
app.sharding.datasource.0.username=sa
app.sharding.datasource.0.password=
app.sharding.datasource.1.url=jdbc:h2:mem:shard1;DB_CLOSE_DELAY=-1
app.sharding.datasource.1.username=sa
app.sharding.datasource.1.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

app.remote.payments-url=http://localhost:8080/api/v1/payments
